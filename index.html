-secondary)}.print-area{background:white;color:#111;padding:20px}.search-box{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text-primary);font-size:13px}.theme-toggle{width:40px;height:40px;border-radius:12px;border:none;background:var(--surface-2);color:var(--text-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:var(--transition)}.theme-toggle:hover{background:var(--border)}.badge{display:inline-block;background:var(--red);color:white;border-radius:999px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}.pagination{display:flex;justify-content:center;gap:6px;margin-top:16px}.pagination button{padding:6px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text-primary);border-radius:8px;cursor:pointer;font-size:12px;transition:var(--transition)}.pagination button:hover{background:var(--blue);color:white}.pagination button.active{background:var(--blue);color:white}.loading{text-align:center;padding:40px 20px;font-size:14px}.loader{display:inline-block;width:40px;height:40px;border:4px solid var(--border);border-radius:50%;border-top:4px solid var(--blue);animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes slideIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@media(max-width:500px){body{background:var(--bg-app)}#app{min-height:100vh;min-height:100dvh;align-items:flex-start;justify-content:flex-start}.app-container{max-width:100%!important;width:100%!important;max-height:none!important;height:100vh!important;height:100dvh!important;aspect-ratio:unset!important;border-radius:0!important;box-shadow:none!important;padding-top:env(safe-area-inset-top,0)}.app-notch,.phone-status-bar{display:none!important}.app-body{padding-top:8px!important}}@media print{body{background:white}#app{display:block}.app-container{box-shadow:none;border-radius:0;height:auto;max-width:none}.app-notch,.phone-status-bar,.tabs,.header,.no-print{display:none!important}.app-body,.content{overflow:visible;padding:0}.only-print{display:block!important}}.only-print{display:none}

<script>
const App={
  db:null,
  SQL:null,
  user:null,
  view:'dashboard',
  modal:null,
  toast:'',
  chart:null,
  fallback:false,
  theme:'light',
  sessionTimeout:30,
  charts:{},
  currentPage:{receivables:1,payments:1,customers:1,reports:1},
  itemsPerPage:5
};

const roles={
  admin:['dashboard','users','settings','audit'],
  sales:['dashboard','customers','receivables','reports'],
  finance:['dashboard','receivables','payments','reports'],
  manager:['dashboard','receivables','payments','reports','audit'],
  owner:['dashboard','settings','audit']
};

const roleLabels={
  admin:'Admin',
  sales:'Staf Penjualan',
  finance:'Staf Keuangan',
  manager:'Manajer Keuangan',
  owner:'Pemilik Perusahaan'
};

function q(sql,params=[]){
  try{
    if(!App.db)return[];
    const stmt=App.db.prepare(sql);
    stmt.bind(params);
    const rows=[];
    while(stmt.step())rows.push(stmt.getAsObject());
    stmt.free();
    return rows;
  }catch(e){
    console.error('SQL Error:',e,sql);
    return[];
  }
}

function run(sql,params=[]){
  try{
    if(!App.db)return;
    App.db.run(sql,params);
    saveDb();
    render();
  }catch(e){
    console.error('Run Error:',e);
    showToast('Error: '+e.message);
  }
}

function money(n){return 'Rp '+Number(n||0).toLocaleString('id-ID')}
function today(){return new Date().toISOString().slice(0,10)}
function showToast(t){App.toast=t;render();setTimeout(()=>{App.toast='';render()},2600)}
function validateEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}
function validatePassword(p){return p.length>=8&&/[A-Z]/.test(p)&&/[0-9]/.test(p)}

function idbGet(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('piutangku-db',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('files');
    r.onerror=()=>rej(r.error);
    r.onsuccess=()=>{
      const tx=r.result.transaction('files','readonly');
      const g=tx.objectStore('files').get('main');
      g.onsuccess=()=>res(g.result);
      g.onerror=()=>rej(g.error);
    }
  });
}

function idbSet(data){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('piutangku-db',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('files');
    r.onerror=()=>rej(r.error);
    r.onsuccess=()=>{
      const tx=r.result.transaction('files','readwrite');
      tx.objectStore('files').put(data,'main');
      tx.oncomplete=res;
      tx.onerror=()=>rej(tx.error);
    }
  });
}

async function saveDb(){
  try{
    if(!App.db)return;
    const data=App.db.export();
    await idbSet(data);
    localStorage.setItem('piutangku_backup_b64',btoa(String.fromCharCode(...data)));
    localStorage.setItem('piutangku_last_save',new Date().toISOString());
  }catch(e){
    console.error('Save error:',e);
  }
}

function schema(){
  if(!App.db)return;
  try{
    App.db.run(`PRAGMA foreign_keys=ON;
      CREATE TABLE IF NOT EXISTS users(id INTEGER PRIMARY KEY AUTOINCREMENT,name TEXT,email TEXT UNIQUE,password TEXT,role TEXT,status TEXT DEFAULT 'active',created_at TEXT DEFAULT CURRENT_TIMESTAMP);
      CREATE TABLE IF NOT EXISTS customers(id INTEGER PRIMARY KEY AUTOINCREMENT,name TEXT,phone TEXT,email TEXT,address TEXT,created_by INTEGER,created_at TEXT DEFAULT CURRENT_TIMESTAMP,FOREIGN KEY(created_by) REFERENCES users(id));
      CREATE TABLE IF NOT EXISTS receivables(id INTEGER PRIMARY KEY AUTOINCREMENT,customer_id INTEGER,invoice_no TEXT UNIQUE,transaction_date TEXT,due_date TEXT,amount REAL,paid_amount REAL DEFAULT 0,remaining_amount REAL DEFAULT 0,status TEXT DEFAULT 'unpaid',created_by INTEGER,created_at TEXT DEFAULT CURRENT_TIMESTAMP,FOREIGN KEY(customer_id) REFERENCES customers(id),FOREIGN KEY(created_by) REFERENCES users(id));
      CREATE TABLE IF NOT EXISTS payments(id INTEGER PRIMARY KEY AUTOINCREMENT,receivable_id INTEGER,payment_date TEXT,amount REAL,method TEXT,note TEXT,created_by INTEGER,created_at TEXT DEFAULT CURRENT_TIMESTAMP,FOREIGN KEY(receivable_id) REFERENCES receivables(id),FOREIGN KEY(created_by) REFERENCES users(id));
      CREATE TABLE IF NOT EXISTS reports(id INTEGER PRIMARY KEY AUTOINCREMENT,report_no TEXT,report_type TEXT,period_start TEXT,period_end TEXT,created_by INTEGER,created_at TEXT DEFAULT CURRENT_TIMESTAMP,status TEXT DEFAULT 'generated',file_name TEXT,FOREIGN KEY(created_by) REFERENCES users(id));
      CREATE TABLE IF NOT EXISTS audit_log(id INTEGER PRIMARY KEY AUTOINCREMENT,user_id INTEGER,action TEXT,table_name TEXT,record_id INTEGER,old_value TEXT,new_value TEXT,timestamp TEXT DEFAULT CURRENT_TIMESTAMP,FOREIGN KEY(user_id) REFERENCES users(id));
    `);

    if(q('SELECT COUNT(*) c FROM users')[0].c===0){
      App.db.run(`
        INSERT INTO users(name,email,password,role,status) VALUES 
        ('Andi Pratama','admin@piutangku.local','Admin@123','admin','active'),
        ('Rina Oktaviani','sales@piutangku.local','Sales@123','sales','active'),
        ('Siti Rahmawati','keuangan@piutangku.local','Finance@123','finance','active'),
        ('Dedi Kurniawan','manager@piutangku.local','Manager@123','manager','active'),
        ('Budi Santoso','owner@piutangku.local','Owner@123','owner','active');
        
        INSERT INTO customers(name,phone,email,address,created_by) VALUES 
        ('PT Sinar Abadi','081234567001','finance@sinarabadi.co.id','Jl. Merdeka No. 10, Bandung',2),
        ('CV Maju Jaya','081234567002','admin@majujaya.id','Jl. Sudirman No. 22, Jakarta',2),
        ('Toko Berkah Sentosa','081234567003','owner@berkahsentosa.id','Jl. Diponegoro No. 5, Surabaya',2);
        
        INSERT INTO receivables(customer_id,invoice_no,transaction_date,due_date,amount,created_by) VALUES 
        (1,'INV-2026-001','2026-07-01','2026-07-30',12500000,2),
        (2,'INV-2026-002','2026-07-04','2026-07-20',7800000,2),
        (3,'INV-2026-003','2026-07-10','2026-08-10',4300000,2);
        
        INSERT INTO payments(receivable_id,payment_date,amount,method,note,created_by) VALUES 
        (1,'2026-07-12',5000000,'Transfer','Pembayaran pertama',3),
        (2,'2026-07-16',7800000,'Tunai','Lunas',3);
      `);
    }
    saveDb();
  }catch(e){
    console.error('Schema error:',e);
  }
}

function toggleTheme(){
  App.theme=App.theme==='light'?'dark':'light';
  document.documentElement.classList.toggle('dark-mode');
  localStorage.setItem('piutangku_theme',App.theme);
  render();
}

async function boot(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),1000);
  
  const savedTheme=localStorage.getItem('piutangku_theme')||'light';
  if(savedTheme==='dark'){
    document.documentElement.classList.add('dark-mode');
    App.theme='dark';
  }
  
  try{
    if(typeof initSqlJs==='undefined'){
      throw new Error('SQL.js library not loaded');
    }
    
    App.SQL=await initSqlJs({locateFile:f=>'https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/'+f});
    
    let data=null;
    try{
      data=await idbGet();
    }catch(e){
      console.warn('IDB error, trying localStorage',e);
      const b=localStorage.getItem('piutangku_backup_b64');
      if(b){
        const s=atob(b);
        data=new Uint8Array([...s].map(c=>c.charCodeAt(0)));
      }
    }
    
    App.db=data?new App.SQL.Database(data):new App.SQL.Database();
    schema();
    render();
  }catch(e){
    console.error('Boot error:',e);
    renderFallback(e);
  }
}

function can(v){return App.user&&roles[App.user.role].includes(v)}

function navs(){
  const all=[['dashboard','🏠','Dasbor'],['customers','🏢','Pelanggan'],['receivables','🧾','Piutang'],['payments','💳','Bayar'],['reports','📄','Laporan'],['users','👥','User'],['settings','⚙️','Setelan']];
  return all.filter(x=>can(x[0])).slice(0,5);
}

function render(){
  const r=document.getElementById('root');
  if(!App.db){
    r.innerHTML=`<div class="loading"><div class="loader"></div><p>Inisialisasi database...</p></div>`;
    return;
  }
  
  if(!App.user){
    r.innerHTML=loginHtml();
    setTimeout(bindLogin,100);
    return;
  }
  
  r.innerHTML=`${App.toast?`<div class="toast">${App.toast}</div>`:''}<div class="header"><div class="brand"><div class="logo">P</div><div><h2>PiutangKu</h2><p class="small muted">${roleLabels[App.user.role]} • ${App.user.name}</p></div></div><div class="header-actions"><button class="theme-toggle" onclick="toggleTheme()" title="Toggle tema">${App.theme==='light'?'🌙':'☀️'}</button><button class="btn ghost" onclick="logout()">Keluar</button></div></div><div class="content">${page()}</div><div class="tabs">${navs().map(n=>`<button class="tab ${App.view===n[0]?'active':''}" onclick="go('${n[0]}')"><span>${n[1]}</span><span>${n[2]}</span></button>`).join('')}</div>${App.modal?modalHtml():''}`;
  setTimeout(()=>{drawChart()},50);
}

function loginHtml(){
  return `<div class="login"><div class="login-logo">P</div><h1 class="title" style="text-align:center">PiutangKu Pro</h1><p class="muted" style="text-align:center;margin:10px 0 22px">Aplikasi Manajemen Piutang Terpadu</p><div class="card"><label>Email Login<select id="email"><option value="admin@piutangku.local">admin@piutangku.local (Admin)</option><option value="sales@piutangku.local">sales@piutangku.local (Sales)</option><option value="keuangan@piutangku.local">keuangan@piutangku.local (Finance)</option><option value="manager@piutangku.local">manager@piutangku.local (Manager)</option><option value="owner@piutangku.local">owner@piutangku.local (Owner)</option></select></label><label>Password<input id="password" type="password" placeholder="Password"></label><button class="btn" style="width:100%" id="loginBtn">Masuk</button></div></div>`;
}

function bindLogin(){
  const loginBtn=document.getElementById('loginBtn');
  const emailSel=document.getElementById('email');
  const passSel=document.getElementById('password');
  
  if(loginBtn){
    loginBtn.onclick=()=>{
      const email=emailSel.value;
      const password=passSel.value;
      
      if(!email||!password){
        showToast('❌ Email dan password harus diisi');
        return;
      }
      
      const u=q('SELECT * FROM users WHERE email=? AND password=? AND status="active"',[email,password])[0];
      if(u){
        App.user=u;
        App.view='dashboard';
        localStorage.setItem('piutangku_last_login',new Date().toISOString());
        showToast('✅ Berhasil masuk');
        render();
      }else{
        showToast('❌ Email atau password salah');
      }
    };
  }
}

function logout(){
  App.user=null;
  App.view='dashboard';
  localStorage.removeItem('piutangku_session');
  render();
}

function go(v){
  App.view=v;
  App.currentPage[v]=1;
  render();
}

function statusP(s){
  return s==='paid'?'<span class="pill green">✓ Lunas</span>':s==='partial'?'<span class="pill yellow">◐ Setengah</span>':'<span class="pill red">✗ Belum</span>';
}

function stats(){
  const result=q(`SELECT 
    (SELECT COUNT(*) FROM customers) customers,
    (SELECT COUNT(*) FROM receivables) trx,
    (SELECT COALESCE(SUM(amount),0) FROM receivables) total,
    (SELECT COALESCE(SUM(remaining_amount),0) FROM receivables) remain,
    (SELECT COUNT(*) FROM receivables WHERE due_date < date('now') AND status!='paid') overdue,
    (SELECT COALESCE(SUM(amount),0) FROM payments) paid
  `);
  return result[0]||{customers:0,trx:0,total:0,remain:0,overdue:0,paid:0};
}

function page(){
  if(App.view==='dashboard')return dashboard();
  if(App.view==='customers')return customers();
  if(App.view==='receivables')return receivables();
  if(App.view==='payments')return payments();
  if(App.view==='reports')return reports();
  if(App.view==='users')return users();
  return settings();
}

function dashboard(){
  const s=stats();
  const overduePct=s.trx>0?Math.round((s.overdue/s.trx)*100):0;
  return `<div class="hero"><h1>📊 Dashboard</h1><p>Ringkasan cepat piutang, pembayaran, pelanggan.</p></div><div class="grid three"><div class="card"><p class="small muted">Total Piutang</p><div class="stat">${money(s.total)}</div></div><div class="card"><p class="small muted">Sisa Piutang</p><div class="stat">${money(s.remain)}</div></div><div class="card"><p class="small muted">Sudah Bayar</p><div class="stat">${money(s.paid)}</div></div></div><div class="grid two"><div class="card"><p class="small muted">Pelanggan</p><div class="stat">${s.customers}</div></div><div class="card"><p class="small muted">⚠️ Overdue</p><div class="stat" style="color:var(--red)">${s.overdue}</div></div></div><div class="card" style="margin-top:12px"><b>📈 Grafik</b><canvas id="chart-doughnut" height="170"></canvas></div><h3 style="margin:16px 0 10px">Transaksi Terbaru</h3><div class="list">${q('SELECT r.*,c.name customer FROM receivables r JOIN customers c ON c.id=r.customer_id ORDER BY r.id DESC LIMIT 5').map(x=>`<div class="card"><div class="row"><div><b>${x.invoice_no}</b><p class="small muted">${x.customer}</p></div>${statusP(x.status)}</div><p style="margin-top:8px"><b>${money(x.remaining_amount)}</b> dari ${money(x.amount)}</p></div>`).join('')}</div>`;
}

function customers(){
  const data=q('SELECT * FROM customers ORDER BY id DESC');
  return `<div class="row"><h2>👥 Pelanggan (${data.length})</h2><button class="btn sm" onclick="openModal('customer')">+ Tambah</button></div><div class="list" style="margin-top:12px">${data.map(c=>`<div class="card"><b>${c.name}</b><p class="small muted">${c.email}</p><p class="small">${c.phone}</p></div>`).join('')}</div>`;
}

function receivables(){
  const data=q('SELECT r.*,c.name customer FROM receivables r JOIN customers c ON c.id=r.customer_id ORDER BY r.id DESC');
  return `<div class="row"><h2>🧾 Piutang (${data.length})</h2>${App.user.role==='sales'?`<button class="btn sm" onclick="openModal('receivable')">+ Tambah</button>`:''}</div><div class="list" style="margin-top:12px">${data.map(x=>`<div class="card"><div class="row"><div><b>${x.invoice_no}</b><p class="small muted">${x.customer}</p></div>${statusP(x.status)}</div><div class="grid two" style="margin-top:10px"><p><span class="small muted">Nominal</span><br><b>${money(x.amount)}</b></p><p><span class="small muted">Sisa</span><br><b>${money(x.remaining_amount)}</b></p></div></div>`).join('')}</div>`;
}

function payments(){
  const data=q('SELECT p.*,r.invoice_no,c.name customer FROM payments p JOIN receivables r ON r.id=p.receivable_id JOIN customers c ON c.id=r.customer_id ORDER BY p.id DESC');
  return `<div class="row"><h2>💳 Pembayaran (${data.length})</h2>${App.user.role==='finance'?`<button class="btn sm" onclick="openModal('payment')">+ Catat</button>`:''}</div><div class="list" style="margin-top:12px">${data.map(p=>`<div class="card"><div class="row"><div><b>${money(p.amount)}</b><p class="small muted">${p.customer}</p></div><span class="pill blue">${p.method}</span></div><p class="small" style="margin-top:8px">${p.payment_date}</p></div>`).join('')||'<div class="empty">Belum ada data</div>'}</div>`;
}

function reports(){
  const data=q('SELECT r.*,u.name creator FROM reports r LEFT JOIN users u ON u.id=r.created_by ORDER BY r.id DESC');
  return `<div class="row"><h2>📄 Laporan (${data.length})</h2><button class="btn sm" onclick="openModal('report')">+ Buat</button></div><div class="list" style="margin-top:12px">${data.map(x=>`<div class="card"><b>${x.report_no}</b><p class="small muted">${x.report_type}</p></div>`).join('')||'<div class="empty">Belum ada laporan</div>'}</div>`;
}

function users(){
  const data=q('SELECT * FROM users ORDER BY id');
  return `<div class="row"><h2>👥 Pengguna</h2><button class="btn sm" onclick="openModal('user')">+ Tambah</button></div><div class="list" style="margin-top:12px">${data.map(u=>`<div class="card"><b>${u.name}</b><p class="small muted">${u.email}</p><span class="pill blue">${roleLabels[u.role]}</span></div>`).join('')}</div>`;
}

function settings(){
  return `<h2>⚙️ Pengaturan</h2><div class="card" style="margin-top:12px"><b>👤 Profil</b><p class="small muted">Nama: ${App.user.name}</p><p class="small muted">Email: ${App.user.email}</p></div><div class="card" style="margin-top:12px"><b>💾 Backup</b><button class="btn sm" onclick="exportDb()">Unduh</button></div>`;
}

function openModal(t){App.modal=t;render()}
function closeModal(){App.modal=null;render()}

function modalHtml(){
  const t=App.modal;
  if(t==='customer')return sheet('➕ Tambah Pelanggan',`<label>Nama<input id="m_name"></label><label>Email<input id="m_email" type="email"></label><label>Telepon<input id="m_phone"></label><label>Alamat<textarea id="m_address"></textarea></label><button class="btn" onclick="saveCustomer()">Simpan</button>`);
  if(t==='receivable'){
    const opts=q('SELECT * FROM customers').map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    return sheet('➕ Tambah Piutang',`<label>Pelanggan<select id="m_customer">${opts}</select></label><label>Invoice<input id="m_invoice"></label><label>Nominal<input id="m_amount" type="number"></label><button class="btn" onclick="saveReceivable()">Simpan</button>`);
  }
  if(t==='payment'){
    const opts=q('SELECT r.*,c.name customer FROM receivables r JOIN customers c ON c.id=r.customer_id WHERE r.status!="paid"').map(r=>`<option value="${r.id}">${r.invoice_no}</option>`).join('');
    return sheet('💳 Catat Pembayaran',`<label>Piutang<select id="m_receivable">${opts}</select></label><label>Jumlah<input id="m_amount" type="number"></label><label>Metode<select id="m_method"><option>Transfer</option><option>Tunai</option></select></label><button class="btn" onclick="savePayment()">Simpan</button>`);
  }
  if(t==='user')return sheet('➕ Tambah User',`<label>Nama<input id="m_name"></label><label>Email<input id="m_email" type="email"></label><label>Password<input id="m_password" type="password"></label><label>Role<select id="m_role"><option value="sales">Sales</option><option value="finance">Finance</option><option value="manager">Manager</option></select></label><button class="btn" onclick="saveUser()">Simpan</button>`);
  return sheet('📄 Laporan',`<button class="btn" onclick="generateReport()">Generate</button>`);
}

function sheet(title,body){return `<div class="modal"><div class="sheet"><div class="row" style="margin-bottom:12px"><h2>${title}</h2><button class="btn secondary sm" onclick="closeModal()">✕</button></div>${body}</div></div>`}

function saveCustomer(){
  const name=document.getElementById('m_name').value;
  const email=document.getElementById('m_email').value;
  const phone=document.getElementById('m_phone').value;
  const address=document.getElementById('m_address').value;
  if(!name||!email||!phone){showToast('❌ Isi semua field');return}
  run('INSERT INTO customers(name,email,phone,address,created_by) VALUES(?,?,?,?,?)',[name,email,phone,address,App.user.id]);
  closeModal();
  showToast('✅ Pelanggan ditambahkan');
}

function saveReceivable(){
  const customer=document.getElementById('m_customer').value;
  const invoice=document.getElementById('m_invoice').value;
  const amount=document.getElementById('m_amount').value;
  if(!customer||!invoice||!amount){showToast('❌ Isi semua field');return}
  run('INSERT INTO receivables(customer_id,invoice_no,transaction_date,due_date,amount,created_by) VALUES(?,?,?,?,?,?)',[customer,invoice,today(),today(),Number(amount),App.user.id]);
  closeModal();
  showToast('✅ Piutang ditambahkan');
}

function savePayment(){
  const receivable=document.getElementById('m_receivable').value;
  const amount=document.getElementById('m_amount').value;
  const method=document.getElementById('m_method').value;
  if(!receivable||!amount){showToast('❌ Isi semua field');return}
  run('INSERT INTO payments(receivable_id,payment_date,amount,method,note,created_by) VALUES(?,?,?,?,?,?)',[receivable,today(),Number(amount),method,'',App.user.id]);
  closeModal();
  showToast('✅ Pembayaran dicatat');
}

function saveUser(){
  const name=document.getElementById('m_name').value;
  const email=document.getElementById('m_email').value;
  const password=document.getElementById('m_password').value;
  const role=document.getElementById('m_role').value;
  if(!name||!email||!password){showToast('❌ Isi semua field');return}
  run('INSERT INTO users(name,email,password,role,status) VALUES(?,?,?,?,"active")',[name,email,password,role]);
  closeModal();
  showToast('✅ User ditambahkan');
}

function generateReport(){
  const no='RPT-'+Date.now();
  run('INSERT INTO reports(report_no,report_type,period_start,period_end,created_by) VALUES(?,?,?,?,?)',[no,'Laporan Piutang',today(),today(),App.user.id]);
  closeModal();
  showToast('✅ Laporan dibuat');
}

function exportDb(){
  if(!App.db)return;
  const data=App.db.export();
  const blob=new Blob([data],{type:'application/octet-stream'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='piutangku-'+today()+'.sqlite';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✅ File diunduh');
}

function drawChart(){
  const c=document.getElementById('chart-doughnut');
  if(!c)return;
  if(App.charts.doughnut)App.charts.doughnut.destroy();
  const s=stats();
  App.charts.doughnut=new Chart(c,{
    type:'doughnut',
    data:{
      labels:['Terbayar','Sisa'],
      datasets:[{data:[s.paid,s.remain],backgroundColor:['#16a34a','#2563eb'],borderWidth:0}]
    },
    options:{responsive:true,plugins:{legend:{position:'bottom'}},cutout:'68%'}
  });
}

function renderFallback(e){
  console.error('Fallback triggered:',e);
  document.getElementById('root').innerHTML=`<div class="login"><div class="login-logo">P</div><h1 class="title" style="text-align:center">⚠️ Error</h1><p class="muted" style="text-align:center">${e.message}</p><div class="card"><p class="small">Coba refresh halaman atau gunakan browser yang berbeda</p></div></div>`;
}

// Start the app
window.addEventListener('load',boot);
setTimeout(boot,1000); // Fallback if load event doesn't fire
</script></body></html>
